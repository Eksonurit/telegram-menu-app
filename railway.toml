# Railway PaaS — конфіг деплою Pic2Recipe
# Документація: https://docs.railway.com/reference/config-as-code
#
# Як задеплоїти:
#   1. railway.app → New Project → Deploy from GitHub
#   2. Add PostgreSQL → підключити DATABASE_URL до Web Service (Reference)
#   3. Variables — див. railway.env.example
#   4. Settings → Networking → Generate Domain
#   5. TELEGRAM_MINI_APP_URL і CORS_ORIGIN = public Railway URL
#   6. BotFather + setWebhook → /api/payments/webhook

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["client/**", "server/**", "Dockerfile", "package.json"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
