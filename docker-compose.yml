# Pic2Recipe — Docker Compose
#
# Локальна розробка (лише PostgreSQL, як раніше через docker run):
#   docker compose up db -d
#   DATABASE_URL у server/.env:
#     postgresql://user:password@localhost:5435/recipe_mini_app
#
# Повний стек (app + db, prod-like на VPS):
#   1. Скопіюй .env.docker.example → .env у корені репозиторію
#   2. Заповни секрети (TELEGRAM_BOT_TOKEN, GEMINI_API_KEY, …)
#   3. docker compose up -d --build
#
# Якщо вже є контейнер pic2recipe-db від ручного docker run:
#   docker stop pic2recipe-db && docker rm pic2recipe-db
#   docker compose up db -d

services:
  db:
    image: postgres:16
    container_name: pic2recipe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recipe_mini_app
    ports:
      # 5435 на хості — щоб не конфліктувати з локальним Postgres на 5432
      - "5435:5432"
    volumes:
      - pic2recipe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d recipe_mini_app"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-your_bot_username}
        VITE_BASE_PATH: /
    container_name: pic2recipe-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Усередині Docker-мережі БД доступна як hostname «db», порт 5432
      DATABASE_URL: postgresql://user:password@db:5432/recipe_mini_app
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_MINI_APP_URL: ${TELEGRAM_MINI_APP_URL}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PREMIUM_PRICE_STARS: ${PREMIUM_PRICE_STARS:-50}
      DAILY_FREE_LIMIT: ${DAILY_FREE_LIMIT:-3}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}

volumes:
  pic2recipe_pgdata:
